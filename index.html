<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>멀티 툴 서비스 (로또 & AI 테스트 & 메뉴 추천)</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- 테마 초기화 스크립트 -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') {
                document.documentElement.classList.add('dark-mode');
                document.body?.classList.add('dark-mode');
            }
        })();
    </script>

    <!-- TensorFlow & Teachable Machine -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="테마 변경">☀️</button>
        
        <!-- 탭 메뉴 -->
        <div class="tab-menu">
            <button class="tab-btn active" data-tab="lotto">로또 추천</button>
            <button class="tab-btn" data-tab="gender">AI 남녀상</button>
            <button class="tab-btn" data-tab="dinner">오늘의 메뉴</button>
        </div>

        <!-- 로또 섹션 -->
        <div id="lotto-section" class="tab-content active">
            <h1>로또 번호 생성기</h1>
            <div class="lotto-image">
                <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <radialGradient id="ballGradient" cx="30%" cy="30%" r="70%">
                            <stop offset="0%" stop-color="#FFEB3B"/>
                            <stop offset="100%" stop-color="#FBC02D"/>
                        </radialGradient>
                    </defs>
                    <circle cx="50" cy="50" r="45" fill="url(#ballGradient)"/>
                    <circle cx="50" cy="50" r="28" fill="white" opacity="0.9"/>
                    <text x="50" y="62" font-family="'Pretendard', sans-serif" font-size="32" font-weight="900" fill="#FBC02D" text-anchor="middle">7</text>
                </svg>
            </div>
            <div id="numbers" class="numbers-container"></div>
            <button id="generate-btn" class="main-btn">번호 생성하기</button>

            <div class="disqus-count">
                <a href="#comment-area" class="dsq-count-link" id="lotto-count-link">댓글 보기</a>
            </div>
        </div>

        <!-- 남녀상 테스트 섹션 -->
        <div id="gender-section" class="tab-content">
            <h1>AI 남녀상 테스트</h1>
            <p class="subtitle">사진을 업로드하여 분석해보세요</p>
            
            <div class="upload-area" id="upload-area">
                <input type="file" id="image-input" accept="image/*" hidden>
                <label for="image-input" class="upload-label">
                    <div class="upload-icon">📸</div>
                    <span>사진 업로드하기</span>
                </label>
                <img id="preview-image" style="display: none; max-width: 100%; border-radius: 10px; margin-top: 10px;">
            </div>

            <div id="loading-spinner" style="display: none; margin: 20px 0;">분석 중...</div>
            <div id="label-container"></div>

            <div class="disqus-count">
                <a href="#comment-area" class="dsq-count-link" id="gender-count-link">댓글 보기</a>
            </div>
        </div>

        <!-- 저녁 메뉴 추천 섹션 -->
        <div id="dinner-section" class="tab-content">
            <h1>오늘 저녁 뭐 먹지?</h1>
            <p class="subtitle">다양한 인기 메뉴와 레시피를 추천해드려요</p>
            
            <div class="menu-display" id="menu-display">
                <div id="menu-image-container" class="menu-image-container">
                    <div class="menu-emoji" id="menu-emoji">🍽️</div>
                    <img id="menu-img" style="display: none;">
                </div>
                <div class="menu-name" id="menu-name">메뉴를 추천받아보세요</div>
                <div id="menu-category" class="menu-category"></div>
                
                <div id="recipe-container" class="recipe-container" style="display: none;">
                    <div class="recipe-section">
                        <h3>[ 주재료 ]</h3>
                        <p id="recipe-ingredients"></p>
                    </div>
                    <div class="recipe-section">
                        <h3>[ 조리 순서 ]</h3>
                        <ol id="recipe-steps"></ol>
                    </div>
                </div>
            </div>
            
            <button id="recommend-menu-btn" class="main-btn">메뉴 추천받기</button>

            <div class="disqus-count">
                <a href="#comment-area" class="dsq-count-link" id="dinner-count-link">댓글 보기</a>
            </div>
        </div>

        <hr class="divider">

        <!-- Disqus 댓글 영역 -->
        <div class="disqus-wrapper" id="comment-area">
            <div id="disqus_thread"></div>
        </div>

        <hr class="divider">

        <div class="inquiry-form">
            <h2>제휴 문의</h2>
            <form action="https://formspree.io/f/xreygbbb" method="POST">
                <div class="form-group">
                    <label for="name">이름</label>
                    <input type="text" id="name" name="name" required placeholder="성함을 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="email">이메일</label>
                    <input type="email" id="email" name="_replyto" required placeholder="이메일 주소를 입력해주세요">
                </div>
                <div class="form-group">
                    <label for="message">문의 내용</label>
                    <textarea id="message" name="message" required placeholder="문의하실 내용을 입력해주세요"></textarea>
                </div>
                <button type="submit" class="submit-btn">문의하기</button>
            </form>
        </div>
    </div>

    <script src="menuData.js"></script>
    <script src="main.js"></script>
    <script id="dsq-count-scr" src="//productbuilder-j0ykvmteku.disqus.com/count.js" async></script>
</body>
</html>
