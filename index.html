<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>로또 번호 생성기</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Firebase SDK (v9 Compat mode) using reserved URLs for auto-init -->
    <script defer src="/__/firebase/10.8.0/firebase-app-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/10.8.0/firebase-firestore-compat.js"></script>
    <!-- Automatic initialization script provided by Firebase Hosting -->
    <script defer src="/__/firebase/init.js"></script>
</head>
<body>
    <div class="container">
        <button id="theme-toggle" class="theme-toggle" title="테마 변경">🌓</button>
        <h1>로또 번호 생성기</h1>
        <div id="numbers" class="numbers-container">
            <!-- 번호가 여기에 생성됩니다. -->
        </div>
        <button id="generate-btn">번호 생성하기</button>
    </div>

    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Firebase 초기화 확인 (디버깅용)
            try {
                if (typeof firebase !== 'undefined') {
                    console.log('Firebase initialized successfully.');
                }
            } catch (e) {
                console.error('Error checking Firebase init:', e);
            }
        });
    </script>
</body>
</html>
